<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Smart Point 2</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<style>
:root{--blue:#009ee3;--blue-dark:#0077b6;--blue-light:#e6f6fd;--green:#00a650;--green-light:#e6f9f0;--amber:#f5a623;--amber-light:#fff8e6;--red:#e53935;--red-light:#ffeaea;--gray:#f7f7f5;--gray-2:#efefed;--gray-3:#ddd;--text:#1a1a18;--text-2:#666;--text-3:#999;--white:#fff;--radius:12px;--radius-sm:8px;--shadow:0 1px 3px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f0f0ee;color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
.header{background:var(--white);border-bottom:1px solid var(--gray-3);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.header-brand{display:flex;align-items:center;gap:10px}
.header-logo{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center}
.header-logo svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round}
.header-title{font-size:15px;font-weight:600}
.header-sub{font-size:11px;color:var(--text-3);margin-top:1px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--gray-3);display:flex;z-index:100;height:60px}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10px;color:var(--text-3);cursor:pointer;border:none;background:none;transition:.15s;padding:0;font-family:inherit}
.nav-item.active{color:var(--blue)}
.nav-item i{font-size:22px}
.main{max-width:860px;margin:0 auto;padding:16px 16px 80px}
.screen{display:none}.screen.active{display:block}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.stat-pill{background:var(--white);border:1px solid var(--gray-3);border-radius:10px;padding:10px 8px;text-align:center;box-shadow:var(--shadow)}
.stat-pill-n{font-size:20px;font-weight:600;color:var(--blue)}
.stat-pill-l{font-size:10px;color:var(--text-3);margin-top:1px}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;padding:6px 14px;border:1px solid var(--gray-3);border-radius:20px;font-size:12px;color:var(--text-2);cursor:pointer;background:var(--white);transition:.15s;font-family:inherit}
.chip.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.pcard{background:var(--white);border:1px solid var(--gray-3);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:.15s;box-shadow:var(--shadow)}
.pcard:hover{border-color:var(--blue)}
.pcard-top{display:flex;gap:12px;align-items:flex-start;margin-bottom:10px}
.avatar{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:16px;flex-shrink:0;color:#fff}
.pcard-info{flex:1;min-width:0}
.pcard-name{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcard-sub{font-size:12px;color:var(--text-2);margin-top:1px}
.pcard-meta{display:flex;gap:10px;font-size:11px;color:var(--text-3);flex-wrap:wrap}
.pcard-meta span{display:flex;align-items:center;gap:3px}
.pcard-meta i{font-size:13px}
.pipeline-bar{height:3px;background:var(--gray-2);border-radius:2px;overflow:hidden;margin-top:10px}
.pipeline-fill{height:100%;border-radius:2px;transition:width .3s}
.pcard-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.contact-btns{display:flex;gap:6px}
.cbtn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;border:1px solid var(--gray-3);background:var(--white);cursor:pointer;transition:.15s;text-decoration:none;color:var(--text-2);font-size:17px}
.cbtn.wa{color:#25D366}.cbtn.ig{color:#E1306C}.cbtn.fb{color:#1877F2}.cbtn.em{color:var(--blue)}.cbtn.li{color:#0A66C2}.cbtn.maps{color:#EA4335}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.badge-new{background:var(--blue-light);color:#0077b6}
.badge-follow{background:var(--amber-light);color:#8a5100}
.badge-cold{background:var(--gray-2);color:var(--text-2)}
.badge-hot{background:#fff3e6;color:#cc5500}
.badge-done{background:var(--green-light);color:#1a6640}
.exp-hero{background:linear-gradient(135deg,#0077b6 0%,#009ee3 100%);border-radius:var(--radius);padding:20px;margin-bottom:12px;color:#fff}
.exp-hero-top{display:flex;gap:14px;align-items:flex-start;margin-bottom:16px}
.exp-avatar{width:56px;height:56px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;flex-shrink:0;border:2px solid rgba(255,255,255,.3)}
.exp-name{font-size:18px;font-weight:700;line-height:1.2}
.exp-giro{font-size:13px;opacity:.8;margin-top:3px}
.exp-badge{background:rgba(255,255,255,.2);display:inline-flex;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-top:6px}
.exp-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.exp-stat{background:rgba(255,255,255,.15);border-radius:8px;padding:8px 10px;text-align:center}
.exp-stat-n{font-size:16px;font-weight:700}
.exp-stat-l{font-size:10px;opacity:.8;margin-top:2px}
.exp-section{background:var(--white);border:1px solid var(--gray-3);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.exp-section-title{font-size:12px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.exp-section-title i{font-size:15px;color:var(--blue)}
.field-row{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.field-icon{width:28px;height:28px;background:var(--gray);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;color:var(--text-2)}
.field-label{font-size:11px;color:var(--text-3);margin-bottom:1px}
.field-value{font-size:13px;color:var(--text);word-break:break-all}
.field-value a{color:var(--blue);text-decoration:none}
.quick-contact{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px}
.qbtn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 4px;background:var(--gray);border-radius:10px;cursor:pointer;border:1px solid var(--gray-3);transition:.15s;text-decoration:none;font-family:inherit}
.qbtn:hover{background:var(--gray-2)}
.qbtn i{font-size:22px}
.qbtn span{font-size:10px;color:var(--text-2);font-weight:500}
.qbtn.wa i{color:#25D366}.qbtn.ig i{color:#E1306C}.qbtn.fb i{color:#1877F2}.qbtn.em i{color:var(--blue)}.qbtn.li i{color:#0A66C2}.qbtn.maps i{color:#EA4335}.qbtn.copy i{color:var(--amber)}
.msg-types{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}
.msg-type-btn{padding:10px 12px;border:1px solid var(--gray-3);border-radius:10px;background:var(--white);cursor:pointer;text-align:left;transition:.15s;font-family:inherit}
.msg-type-btn:hover,.msg-type-btn.active{border-color:var(--blue);background:var(--blue-light)}
.msg-type-icon{font-size:20px;margin-bottom:4px}
.msg-type-name{font-size:13px;font-weight:600}
.msg-type-desc{font-size:11px;color:var(--text-3);margin-top:2px}
.msg-output{background:var(--gray);border-radius:10px;padding:14px;font-size:13px;line-height:1.7;min-height:100px;white-space:pre-wrap;border:1px solid var(--gray-3)}
.msg-output.placeholder{color:var(--text-3);font-style:italic}
.msg-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.tl-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray-2)}
.tl-item:last-child{border-bottom:none}
.tl-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.tl-dot-sent{background:var(--blue)}.tl-dot-reply{background:var(--green)}.tl-dot-note{background:var(--amber)}.tl-dot-info{background:var(--text-3)}
.tl-label{font-size:11px;color:var(--text-3);margin-bottom:2px}
.tl-text{font-size:13px}
.form-group{margin-bottom:12px}
.form-label{font-size:12px;font-weight:500;color:var(--text-2);margin-bottom:5px;display:block}
.form-input{width:100%;padding:9px 12px;font-size:14px;border:1px solid var(--gray-3);border-radius:var(--radius-sm);background:var(--white);color:var(--text);font-family:inherit;outline:none;transition:.15s}
.form-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,158,227,.1)}
textarea.form-input{resize:vertical;min-height:80px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-full{grid-column:span 2}
.btn{padding:9px 18px;font-size:13px;font-weight:500;border-radius:var(--radius-sm);border:1px solid var(--gray-3);background:var(--white);color:var(--text);cursor:pointer;transition:.15s;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--gray)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:var(--blue-dark)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-block{width:100%;justify-content:center}
.state-row{display:flex;gap:8px;flex-wrap:wrap}
.state-opt{padding:6px 14px;border-radius:20px;font-size:12px;border:1px solid var(--gray-3);cursor:pointer;background:var(--white);font-family:inherit;color:var(--text-2);transition:.15s}
.state-opt.s0.sel{background:var(--blue-light);color:#0077b6;border-color:#0077b6;font-weight:600}
.state-opt.s1.sel{background:var(--amber-light);color:#8a5100;border-color:var(--amber);font-weight:600}
.state-opt.s2.sel{background:var(--gray-2);color:var(--text-2);font-weight:600}
.state-opt.s3.sel{background:#fff3e6;color:#cc5500;border-color:#f5a623;font-weight:600}
.state-opt.s4.sel{background:var(--green-light);color:#1a6640;border-color:var(--green);font-weight:600}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(0,158,227,.3);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-row{display:flex;align-items:center;gap:8px;color:var(--text-3);font-size:13px;padding:8px 0}
.empty{text-align:center;padding:40px 20px;color:var(--text-3)}
.empty i{font-size:40px;display:block;margin-bottom:8px;opacity:.4}
.link-pill{display:inline-flex;align-items:center;gap:5px;background:var(--blue-light);color:var(--blue-dark);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:500;text-decoration:none;border:1px solid rgba(0,119,182,.2)}
.back-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.back-btn{background:none;border:none;cursor:pointer;color:var(--text-2);font-size:13px;display:flex;align-items:center;gap:4px;padding:0;font-family:inherit}
.back-btn:hover{color:var(--text)}
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a18;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:.3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.pipeline-stage{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--gray-2)}
.pipeline-stage:last-child{border-bottom:none}
.extract-result{background:var(--green-light);border:1px solid #b8e6cf;border-radius:10px;padding:12px}

/* Desktop: wider layout */
@media(min-width:768px){
  .main{padding:24px 24px 80px}
  .pcard{padding:18px 20px}
  .exp-hero{padding:24px}
  .exp-name{font-size:22px}
  .msg-types{grid-template-columns:repeat(4,1fr)}
  .quick-contact{grid-template-columns:repeat(6,1fr)}
  .stats-row{grid-template-columns:repeat(4,1fr)}
  .form-grid{grid-template-columns:1fr 1fr}
  .exp-stats{grid-template-columns:repeat(3,1fr)}
  body{font-size:15px}
}
/* Tablet */
@media(min-width:480px) and (max-width:767px){
  .msg-types{grid-template-columns:repeat(2,1fr)}
  .quick-contact{grid-template-columns:repeat(4,1fr)}
  .stats-row{grid-template-columns:repeat(4,1fr)}
}
/* Mobile */
@media(max-width:479px){
  .form-grid{grid-template-columns:1fr}
  .form-full{grid-column:span 1}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .msg-types{grid-template-columns:1fr 1fr}
  .quick-contact{grid-template-columns:repeat(3,1fr)}
  .exp-stats{grid-template-columns:repeat(3,1fr)}
  .exp-name{font-size:16px}
  .pcard-name{font-size:14px}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-brand">
    <div class="header-logo"><svg viewBox="0 0 18 14"><path d="M1 13l4-8 4 4 4-6 4 7"/></svg></div>
    <div><div class="header-title">CRM Smart Point 2</div><div class="header-sub">Mercado Pago · Adquisicion</div></div>
  </div>
  <div style="display:flex;gap:8px;align-items:center"><button id="btn-backup" class="btn btn-sm" onclick="mostrarBackupPanel()" title="Respaldo de datos" style="padding:7px 10px"><i class="ti ti-database-export" style="font-size:16px"></i></button><button class="btn btn-sm btn-primary" onclick="showScreen('nuevo')"><i class="ti ti-plus"></i> Agregar</button></div>
</div>
<div class="main">
  <div id="s-lista" class="screen active">
    <div class="stats-row" id="stats-row"></div>
    <div class="chips">
      <button class="chip active" onclick="filtrar('todos',this)">Todos</button>
      <button class="chip" onclick="filtrar('Primer contacto',this)">Primer contacto</button>
      <button class="chip" onclick="filtrar('Seguimiento',this)">Seguimiento</button>
      <button class="chip" onclick="filtrar('Sin respuesta',this)">Sin respuesta</button>
      <button class="chip" onclick="filtrar('Caliente',this)">Caliente</button>
      <button class="chip" onclick="filtrar('Cerrado',this)">Cerrado</button>
    </div>
    <div id="lista-container"></div>
  </div>
  <div id="s-detalle" class="screen">
    <div class="back-row"><button class="back-btn" onclick="showScreen('lista')"><i class="ti ti-arrow-left"></i> Prospectos</button></div>
    <div id="exp-container"></div>
  </div>
  <div id="s-nuevo" class="screen">
    <div class="back-row">
      <button class="back-btn" onclick="showScreen('lista')"><i class="ti ti-arrow-left"></i> Cancelar</button>
      <span style="font-size:15px;font-weight:600">Nuevo prospecto</span>
    </div>
    <div class="exp-section">
      <div class="exp-section-title"><i class="ti ti-building-store"></i> Datos del negocio</div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Nombre del negocio *</label><input class="form-input" id="n-nombre" placeholder="Farmacia San Jose" required></div>
        <div class="form-group"><label class="form-label">Giro / Tipo</label><input class="form-input" id="n-giro" placeholder="Farmacia, Restaurante..."></div>
        <div class="form-group"><label class="form-label">Direccion</label><input class="form-input" id="n-dir" placeholder="Av. Principal 123, Col. Centro"></div>
        <div class="form-group"><label class="form-label">Telefono del negocio *</label><input class="form-input" id="n-tel-neg" placeholder="+52 993 000 0000" required></div>
        <div class="form-group"><label class="form-label">Correo electronico del negocio</label><input class="form-input" id="n-email-neg" placeholder="contacto@negocio.com"></div>
        <div class="form-group form-full"><label class="form-label">Resena del negocio</label><textarea class="form-input" id="n-resena" placeholder="Descripcion breve..."></textarea></div>
        <div class="form-group"><label class="form-label">URL / Sitio web</label><input class="form-input" id="n-url-neg" placeholder="https://..."></div>
        <div class="form-group"><label class="form-label">Instagram negocio</label><input class="form-input" id="n-ig-neg" placeholder="@negocio"></div>
        <div class="form-group"><label class="form-label">Facebook negocio</label><input class="form-input" id="n-fb-neg" placeholder="facebook.com/negocio"></div>
      </div>
    </div>
    <div class="exp-section">
      <div class="exp-section-title"><i class="ti ti-user"></i> Datos del dueno / representante</div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Nombre completo</label><input class="form-input" id="n-dueno" placeholder="Carlos Lopez Perez"></div>
        <div class="form-group"><label class="form-label">Cargo / Rol</label><input class="form-input" id="n-cargo" placeholder="Dueno, Gerente..."></div>
        <div class="form-group"><label class="form-label">WhatsApp</label><input class="form-input" id="n-wa" placeholder="+52 993 111 2222"></div>
        <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="n-email" placeholder="contacto@negocio.com"></div>
        <div class="form-group"><label class="form-label">Instagram personal</label><input class="form-input" id="n-ig-due" placeholder="@dueno"></div>
        <div class="form-group"><label class="form-label">LinkedIn</label><input class="form-input" id="n-li" placeholder="linkedin.com/in/..."></div>
        <div class="form-group form-full"><label class="form-label">Perfil del representante</label><textarea class="form-input" id="n-perfil-due" placeholder="Descripcion del dueno, intereses..."></textarea></div>
      </div>
    </div>
    <div class="exp-section">
      <div class="exp-section-title"><i class="ti ti-target"></i> Potencial de venta</div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Facturacion estimada mensual</label>
          <select class="form-input" id="n-facturacion">
            <option value="">Seleccionar...</option>
            <option value="5k-15k">$5k - $15k (minimo KPI)</option>
            <option value="15k-60k">$15k - $60k (potencial medio)</option>
            <option value="60k+">+$60k (alto valor / TPV)</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">Canal de contacto</label>
          <select class="form-input" id="n-canal">
            <option value="WhatsApp">WhatsApp</option>
            <option value="Visita presencial">Visita presencial</option>
            <option value="Llamada">Llamada</option>
            <option value="Instagram">Instagram DM</option>
            <option value="Email">Email</option>
          </select>
        </div>
        <div class="form-group form-full"><label class="form-label">Contexto de venta</label><textarea class="form-input" id="n-contexto" placeholder="Ej. tiene 3 sucursales, ya usa terminal de otro banco, mucho efectivo..."></textarea></div>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:20px">
      <button class="btn btn-primary btn-block" id="btn-guardar" onclick="guardarProspecto()"><i class="ti ti-device-floppy"></i> Guardar prospecto</button>
    </div>
  </div>
  <div id="s-resumen" class="screen"><div id="resumen-container"></div></div>
</div>
<nav class="bottom-nav">
  <button class="nav-item active" id="nav-lista" onclick="showScreen('lista')"><i class="ti ti-users"></i><span>Prospectos</span></button>
  <button class="nav-item" id="nav-nuevo" onclick="showScreen('nuevo')"><i class="ti ti-circle-plus"></i><span>Agregar</span></button>
  <button class="nav-item" id="nav-resumen" onclick="showScreen('resumen')"><i class="ti ti-chart-bar"></i><span>Resumen</span></button>
</nav>
<div class="toast" id="toast"></div>

<script>
const DB='mp_crm_v5';
let prospectos=[];
let filtroActivo='todos';
let activoId=null;
let ultimoMsg='';
const COLORS=['#009ee3','#00a650','#f5a623','#e53935','#8e44ad','#16a085','#d35400','#2980b9'];
const ESTADOS=['Primer contacto','Seguimiento','Sin respuesta','Caliente','Cerrado'];
const PIPELINE_PCT={'Primer contacto':15,'Seguimiento':40,'Sin respuesta':20,'Caliente':75,'Cerrado':100};
const PIPELINE_COL={'Primer contacto':'#009ee3','Seguimiento':'#f5a623','Sin respuesta':'#bbb','Caliente':'#f5501e','Cerrado':'#00a650'};
const BADGE_CLS={'Primer contacto':'badge-new','Seguimiento':'badge-follow','Sin respuesta':'badge-cold','Caliente':'badge-hot','Cerrado':'badge-done'};

function color(s){let h=0;for(let c of s)h=(h*31+c.charCodeAt(0))%COLORS.length;return COLORS[h];}
function initials(s){if(!s)return'?';const p=s.trim().split(/\s+/);return(p[0][0]+(p[1]?p[1][0]:'')).toUpperCase();}
function hoy(n=0){const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().split('T')[0];}
function ahora(){return new Date().toISOString().substring(0,16);}
function badge(e){const c=BADGE_CLS[e]||'badge-cold';return `<span class="badge ${c}">${e}</span>`;}

function cargar(){
  try{prospectos=JSON.parse(localStorage.getItem(DB)||'[]');}catch(e){prospectos=[];}

function showScreen(s){
  document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));
  document.getElementById('s-'+s).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
  const navMap={lista:'nav-lista',detalle:'nav-lista',nuevo:'nav-nuevo',resumen:'nav-resumen'};
  const navEl=document.getElementById(navMap[s]||'nav-lista');
  if(navEl) navEl.classList.add('active');
  if(s==='lista'){renderLista();renderStats();}
  if(s==='resumen') renderResumen();
  window.scrollTo(0,0);
}

function filtrar(f,btn){
  filtroActivo=f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  renderLista();
}

function renderStats(){
  const total=prospectos.length;
  const tpv=prospectos.filter(p=>p.facturacion==='60k+').length;
  const hot=prospectos.filter(p=>p.estado==='Caliente').length;
  const done=prospectos.filter(p=>p.estado==='Cerrado').length;
  document.getElementById('stats-row').innerHTML=
    `<div class="stat-pill"><div class="stat-pill-n">${total}</div><div class="stat-pill-l">Total</div></div>`+
    `<div class="stat-pill"><div class="stat-pill-n">${tpv}</div><div class="stat-pill-l">TPV +$60k</div></div>`+
    `<div class="stat-pill"><div class="stat-pill-n">${hot}</div><div class="stat-pill-l">Calientes</div></div>`+
    `<div class="stat-pill"><div class="stat-pill-n">${done}</div><div class="stat-pill-l">Cerrados</div></div>`;
}

function contactBtns(p,cls){
  let s='';
  if(p.wa) s+=`<a href="https://wa.me/${p.wa.replace(/[^0-9]/g,'')}" target="_blank" class="${cls} wa" title="WhatsApp"><i class="ti ti-brand-whatsapp"></i>${cls==='qbtn'?'<span>WhatsApp</span>':''}</a>`;
  const ig=(p.igNeg||p.igDue||'').replace('@','');
  if(ig) s+=`<a href="https://instagram.com/${ig}" target="_blank" class="${cls} ig"><i class="ti ti-brand-instagram"></i>${cls==='qbtn'?'<span>Instagram</span>':''}</a>`;
  if(p.fbNeg) s+=`<a href="https://${p.fbNeg}" target="_blank" class="${cls} fb"><i class="ti ti-brand-facebook"></i>${cls==='qbtn'?'<span>Facebook</span>':''}</a>`;
  if(p.email) s+=`<a href="mailto:${p.email}" class="${cls} em"><i class="ti ti-mail"></i>${cls==='qbtn'?'<span>Email</span>':''}</a>`;
  if(p.li) s+=`<a href="https://${p.li}" target="_blank" class="${cls} li"><i class="ti ti-brand-linkedin"></i>${cls==='qbtn'?'<span>LinkedIn</span>':''}</a>`;
  if(p.dir) s+=`<a href="https://maps.google.com/?q=${encodeURIComponent(p.dir)}" target="_blank" class="${cls} maps"><i class="ti ti-map-pin"></i>${cls==='qbtn'?'<span>Mapa</span>':''}</a>`;
  return s;
}

function renderLista(){
  const lista=filtroActivo==='todos'?prospectos:prospectos.filter(p=>p.estado===filtroActivo);
  const c=document.getElementById('lista-container');
  if(!lista.length){c.innerHTML='<div class="empty"><i class="ti ti-users"></i><p>Sin prospectos en este segmento</p></div>';return;}
  const facL={'5k-15k':'$5k-$15k','15k-60k':'$15k-$60k','60k+':'+$60k'};
  c.innerHTML=lista.map(p=>{
    const dias=Math.floor((Date.now()-new Date(p.creado).getTime())/86400000);
    const pct=PIPELINE_PCT[p.estado]||15;
    const col=PIPELINE_COL[p.estado]||'#009ee3';
    const nom2=p.dueno?(' · '+p.dueno.split(' ').slice(0,2).join(' ')):'';
    return `<div class="pcard" onclick="verExpediente(${p.id})">
      <div class="pcard-top">
        <div class="avatar" style="background:${color(p.nombre)}">${initials(p.nombre)}</div>
        <div class="pcard-info"><div class="pcard-name">${p.nombre}</div><div class="pcard-sub">${p.giro}${nom2}</div></div>
        ${badge(p.estado)}
      </div>
      <div class="pcard-meta">
        <span><i class="ti ti-credit-card"></i>${facL[p.facturacion]||p.facturacion||'-'}</span>
        <span><i class="ti ti-device-mobile"></i>${p.canal}</span>
        <span><i class="ti ti-clock"></i>${dias}d</span>
        <span><i class="ti ti-message"></i>${p.historial.length}</span>
      </div>
      <div class="pipeline-bar"><div class="pipeline-fill" style="width:${pct}%;background:${col}"></div></div>
      <div class="pcard-footer">
        <div class="contact-btns" onclick="event.stopPropagation()">${contactBtns(p,'cbtn')}</div>

      </div>
    </div>`;
  }).join('');
}

function frow(icon,label,val){
  if(!val) return '';
  return `<div class="field-row"><div class="field-icon"><i class="ti ${icon}"></i></div><div><div class="field-label">${label}</div><div class="field-value">${val}</div></div></div>`;
}

function cambiarEstado(id,estado,btn){
  const p=prospectos.find(x=>x.id===id);

  btn.classList.add('sel');
  toast('Estado actualizado');
}

function copiarPromptCompleto(){

  navigator.clipboard.writeText(window._currentPrompt).then(function(){toast('Prompt copiado');});
}


function aplicarMsgPegado(){

}

function copiarMsgIr(red){
  const p=prospectos.find(x=>x.id===activoId);
  if(!ultimoMsg){toast('Genera un mensaje primero');return;}
  navigator.clipboard.writeText(ultimoMsg).then(()=>{
    toast('Mensaje copiado');
    setTimeout(()=>{
      let url='';
      if(red==='wa'&&p.wa) url='https://wa.me/'+p.wa.replace(/[^0-9]/g,'');
      else if(red==='ig'){const ig=(p.igNeg||p.igDue||'').replace('@','');url=ig?'https://instagram.com/'+ig:'https://instagram.com';}
      else if(red==='email'){
        const em=p.email||p.emailNeg||'';
        if(!em){toast('Sin email registrado para este prospecto');return;}
        url='mailto:'+em+'?subject=Point%20Smart%202%20%E2%80%94%20Mercado%20Pago&body='+encodeURIComponent(ultimoMsg);
      }
      if(url) window.open(url,'_blank');
    },600);
  });
}

function aplicarInfo(info){
  const map={nombre:'n-nombre',giro:'n-giro',dir:'n-dir',telNeg:'n-tel-neg',resena:'n-resena',urlNeg:'n-url-neg',igNeg:'n-ig-neg',fbNeg:'n-fb-neg',dueno:'n-dueno',cargo:'n-cargo',wa:'n-wa',email:'n-email',igDue:'n-ig-due',li:'n-li',perfilDue:'n-perfil-due'};
  let filled=0;const names=[];
  Object.keys(map).forEach(k=>{
    const val=info[k];
    if(val&&val!=='null'&&String(val).trim()){
      const el=document.getElementById(map[k]);
      if(el){el.value=String(val).trim();filled++;names.push(k);}
    }
  });
  const statusEl=document.getElementById('ext-status');
  if(filled>0){
    document.getElementById('ext-txt-negocio').value='';
    document.getElementById('ext-txt-dueno').value='';
    statusEl.innerHTML=`<div class="extract-result"><div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><i class="ti ti-circle-check" style="color:var(--green);font-size:18px"></i><strong style="color:#1a6640">${filled} campos llenados automaticamente</strong></div><div style="font-size:11px;color:#1a6640">${names.join(' · ')}</div></div>`;
    setTimeout(()=>document.getElementById('n-nombre').scrollIntoView({behavior:'smooth',block:'center'}),300);
  }else{
    statusEl.innerHTML='<div style="color:#8a5100;font-size:12px;padding:10px;background:var(--amber-light);border-radius:8px">La IA proceso el texto pero los valores quedaron vacios. Pega mas informacion del perfil.</div>';
  }
}

async function extraerConIA(){
  const txtNeg=document.getElementById('ext-txt-negocio').value.trim();
  const txtDue=document.getElementById('ext-txt-dueno').value.trim();
  if(!txtNeg){toast('Pega el texto del perfil del negocio primero');return;}
  const apiKey=localStorage.getItem('mp_crm_apikey');
  const statusEl=document.getElementById('ext-status');
  const btn=document.getElementById('btn-extraer');
  const prompt='Extrae datos de este perfil de negocio. Devuelve SOLO el JSON en una linea sin texto adicional.\n\nTEXTO:\n'+txtNeg+(txtDue?'\n\nREPRESENTANTE:\n'+txtDue:'')+'\n\nJSON requerido (null si no hay dato):\n{"nombre":null,"giro":null,"dir":null,"telNeg":null,"resena":null,"urlNeg":null,"igNeg":null,"fbNeg":null,"dueno":null,"cargo":null,"wa":null,"email":null,"igDue":null,"li":null,"perfilDue":null}\n\ngiro=tipo de negocio inferido. resena=1-2 oraciones. Solo el JSON.';

  if(!apiKey){
    if(typeof sendPrompt==='function'){
      sendPrompt(prompt);
      statusEl.innerHTML='<div style="background:var(--blue-light);border-radius:8px;padding:12px;font-size:12px;color:#0077b6"><strong><i class="ti ti-arrow-up"></i> Enviado a Claude en el chat.</strong> Cuando responda con el JSON, copialo y pegalo aqui:<textarea class="form-input" id="json-fb" placeholder=\'{"nombre":"...\' style="min-height:70px;font-size:12px;font-family:monospace;margin-top:8px"></textarea><button class="btn btn-primary btn-block" onclick="aplicarJsonFb()" style="margin-top:6px"><i class="ti ti-check"></i> Aplicar al formulario</button><div style="margin-top:10px;font-size:11px;border-top:1px solid rgba(0,119,182,.2);padding-top:8px">Para usar sin este chat: guarda tu <a href="https://console.anthropic.com/settings/keys" target="_blank" style="color:#0077b6;font-weight:500">API Key</a> arriba.</div></div>';
    }else{
      statusEl.innerHTML='<div style="background:var(--amber-light);border-radius:8px;padding:12px;font-size:12px;color:#8a5100"><strong>Sin API Key.</strong> Obtén tu <a href="https://console.anthropic.com/settings/keys" target="_blank" style="color:#0077b6;font-weight:500">API Key gratuita de Anthropic</a> y guardala arriba para extraer datos sin necesitar este chat.</div>';
    }
    return;
  }
  btn.disabled=true;btn.innerHTML='<div class="spinner"></div> Analizando...';statusEl.innerHTML='';
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:600,messages:[{role:'user',content:prompt}]})});
    if(!resp.ok){const e=await resp.json().catch(()=>({}));statusEl.innerHTML='<div style="color:var(--red);font-size:12px;padding:10px;background:var(--red-light);border-radius:8px">'+(resp.status===401?'API Key invalida — verifica y guardala de nuevo.':(e.error&&e.error.message)||'Error '+resp.status)+'</div>';btn.disabled=false;btn.innerHTML='<i class="ti ti-sparkles"></i> Extraer informacion con IA';return;}
    const data=await resp.json();
    const blk=data.content&&data.content.find(b=>b.type==='text');
    const raw=blk?blk.text:'';
    let info=null;
    try{info=JSON.parse(raw);}catch(_){}
    if(!info){try{info=JSON.parse(raw.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim());}catch(_){}}
    if(!info){const m=raw.match(/\{[\s\S]*\}/);if(m)try{info=JSON.parse(m[0]);}catch(_){}}
    if(!info){statusEl.innerHTML='<div style="color:var(--red);font-size:12px;padding:10px;background:var(--red-light);border-radius:8px">No se pudo parsear: '+raw.substring(0,100)+'</div>';btn.disabled=false;btn.innerHTML='<i class="ti ti-sparkles"></i> Extraer informacion con IA';return;}
    aplicarInfo(info);
  }catch(e){
    statusEl.innerHTML='<div style="color:var(--red);font-size:12px;padding:10px;background:var(--red-light);border-radius:8px">Error: '+e.message+'</div>';
  }
  btn.disabled=false;btn.innerHTML='<i class="ti ti-sparkles"></i> Extraer informacion con IA';
}

function aplicarJsonFb(){
  const el=document.getElementById('json-fb');
  if(!el){toast('No encontre el campo');return;}
  const raw=el.value.trim();
  if(!raw){toast('Pega el JSON primero');return;}
  let info=null;
  try{info=JSON.parse(raw);}catch(_){}
  if(!info){const m=raw.match(/\{[\s\S]*\}/);if(m)try{info=JSON.parse(m[0]);}catch(_){}}
  if(!info){toast('JSON invalido');return;}
  aplicarInfo(info);
}

function renderResumen(){
  const total=prospectos.length;
  const tpv=prospectos.filter(p=>p.facturacion==='60k+').length;
  const done=prospectos.filter(p=>p.estado==='Cerrado').length;
  const por={};prospectos.forEach(p=>{por[p.estado]=(por[p.estado]||0)+1;});
  let html=`<div class="exp-section"><div class="exp-section-title"><i class="ti ti-chart-bar"></i> Resumen del pipeline</div><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:4px"><div class="stat-pill"><div class="stat-pill-n">${total}</div><div class="stat-pill-l">Total prospectos</div></div><div class="stat-pill"><div class="stat-pill-n">${tpv}</div><div class="stat-pill-l">TPV +$60k</div></div><div class="stat-pill"><div class="stat-pill-n">${por['Caliente']||0}</div><div class="stat-pill-l">Calientes</div></div><div class="stat-pill"><div class="stat-pill-n">${done}</div><div class="stat-pill-l">Cerrados</div></div></div></div>`;
  html+=`<div class="exp-section"><div class="exp-section-title"><i class="ti ti-progress"></i> Por estado</div>`;
  ESTADOS.forEach(e=>{const n=por[e]||0;html+=`<div class="pipeline-stage">${badge(e)}<span style="font-weight:600">${n}</span></div>`;});
  html+=`</div><div class="exp-section"><div class="exp-section-title"><i class="ti ti-credit-card"></i> Por facturacion</div>`;
  [['5k-15k','Minimo KPI $5k-$15k'],['15k-60k','Potencial $15k-$60k'],['60k+','Alto valor +$60k (TPV)']].forEach(([k,l])=>{

function exportarDatos(){
  var data=localStorage.getItem(DB)||'[]';
  var prosp=JSON.parse(data);
  var fecha=new Date().toISOString().split('T')[0];
  var blob=new Blob([data],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download='CRM_MercadoPago_'+fecha+'.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Respaldo descargado ('+prosp.length+' prospectos)');
}

function importarDatos(){
  var input=document.createElement('input');
  input.type='file';
  input.accept='.json';
  input.onchange=function(e){
    var file=e.target.files[0];
    if(!file) return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var data=JSON.parse(ev.target.result);
        if(!Array.isArray(data)) throw new Error('Formato invalido');
        // Merge: add imported prospects that don't exist (by id)
        var existing=prospectos.map(function(p){return p.id;});
        var nuevos=data.filter(function(p){return existing.indexOf(p.id)===-1;});
        var actualizados=0;
        data.forEach(function(imp){
          var idx=prospectos.findIndex(function(p){return p.id===imp.id;});
          if(idx>-1){prospectos[idx]=imp;actualizados++;}
        });
        prospectos=prospectos.concat(nuevos);
        guardar();
        renderLista();renderStats();
        showScreen('lista');
        toast(nuevos.length+' nuevos + '+actualizados+' actualizados importados');
        cerrarBackupPanel();
      }catch(err){
        toast('Error al leer el archivo: '+err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function mostrarBackupPanel(){
  var panel=document.getElementById('backup-panel');
  if(panel){panel.style.display=panel.style.display==='none'?'flex':'none';return;}
  // Create panel
  var el=document.createElement('div');
  el.id='backup-panel';
  el.style.cssText='position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#fff;border:1px solid #e0e0db;border-radius:16px;padding:20px;box-shadow:0 8px 32px rgba(0,0,0,.15);z-index:200;display:flex;flex-direction:column;gap:12px;width:320px;max-width:calc(100vw - 32px)';
  el.innerHTML=
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'+
      '<div style="font-size:15px;font-weight:700;color:#1a1a18">Respaldo de datos</div>'+
      '<button onclick="cerrarBackupPanel()" style="background:none;border:none;cursor:pointer;font-size:20px;color:#999;padding:0;line-height:1">×</button>'+
    '</div>'+
    '<p style="font-size:12px;color:#666;line-height:1.5;margin:0">Exporta tus prospectos para hacer un respaldo o transferirlos a otro navegador/dispositivo.</p>'+
    '<button onclick="exportarDatos()" style="padding:13px;background:#009ee3;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px">'+
      '<i class="ti ti-download" style="font-size:18px"></i> Exportar prospectos (.json)'+
    '</button>'+
    '<button onclick="importarDatos()" style="padding:13px;background:#f7f7f5;color:#1a1a18;border:1.5px solid #e0e0db;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px">'+
      '<i class="ti ti-upload" style="font-size:18px"></i> Importar prospectos (.json)'+
    '</button>'+
    '<p style="font-size:11px;color:#999;text-align:center;margin:0">Al importar se combinan con los actuales sin borrar nada</p>';
  document.body.appendChild(el);
  // Close on outside click
  setTimeout(function(){
    document.addEventListener('click', function handler(ev){

        document.removeEventListener('click',handler);
      }
    });
  },200);
}

function cerrarBackupPanel(){
  var panel=document.getElementById('backup-panel');
  if(panel) panel.remove();
}

    '</div>'+
    '<div style="font-size:12px;color:var(--text-3);margin-bottom:8px">¿Qué respondió el cliente?</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+
      q.opciones.map(function(op){
        return '<button onclick="mostrarRespuesta(\''+op.id+'\','+idx+',event)" style="padding:10px 12px;border:1px solid var(--gray-3);border-radius:10px;background:var(--white);cursor:pointer;text-align:left;font-family:inherit;font-size:13px;transition:.15s" onmouseover="this.style.borderColor=\'var(--blue)\';this.style.background=\'var(--blue-light)\'" onmouseout="this.style.borderColor=\'var(--gray-3)\';this.style.background=\'var(--white)\'">'+
          '<span style="font-size:16px;display:block;margin-bottom:4px">'+op.emoji+'</span>'+
          op.label+
        '</button>';
      }).join('')+
    '</div>'+
  '</div>';
}

function mostrarRespuesta(opId, qIdx, event){
  // Highlight selected button
  const parent = event.target.closest('div[style*="grid"]');
  if(parent) parent.querySelectorAll('button').forEach(function(b){
    b.style.borderColor='var(--gray-3)';b.style.background='var(--white)';
  });
  event.target.closest('button').style.borderColor='var(--blue)';
  event.target.closest('button').style.background='var(--blue-light)';

  const r = FLUJO.respuestas[opId];
  if(!r) return;

  // Remove previous response if any
  const prev = document.getElementById('flujo-resp-'+qIdx);
  if(prev) prev.remove();

  // Remove next questions
  for(let i=qIdx+1; i<FLUJO.preguntas.length+1; i++){
    const el=document.getElementById('flujo-q-'+i);
    if(el) el.remove();
  }

  const div = document.createElement('div');
  div.id = 'flujo-resp-'+qIdx;
  div.style.cssText = 'margin-top:12px;margin-bottom:16px';
  div.innerHTML =
    '<div style="background:var(--green-light);border:1px solid #b8e6cf;border-radius:10px;padding:14px;margin-bottom:10px">'+
      '<div style="font-size:11px;font-weight:600;color:#1a6640;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">'+
        '<span><i class="ti ti-message-check"></i> MENSAJE LISTO PARA ENVIAR</span>'+
        '<button onclick="copiarTexto(\'msg-txt-'+opId+'\')" style="padding:4px 10px;background:var(--green);color:#fff;border:none;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit"><i class="ti ti-copy"></i> Copiar</button>'+
      '</div>'+
      '<div id="msg-txt-'+opId+'" style="font-size:13px;color:var(--text);line-height:1.7;white-space:pre-wrap">'+r.msg+'</div>'+
    '</div>'+
    '<div style="background:var(--amber-light);border:1px solid #f5c97a;border-radius:10px;padding:12px">'+
      '<div style="font-size:11px;font-weight:600;color:#8a5100;margin-bottom:6px"><i class="ti ti-brain"></i> NOTAS DE APOYO PARA JANET</div>'+
      '<div style="font-size:12px;color:#8a5100;line-height:1.6">'+r.nota+'</div>'+
    '</div>';

  event.target.closest('div[style*="grid"]').parentNode.appendChild(div);

  // Show next question if exists
  if(qIdx+1 < FLUJO.preguntas.length){
    const nextDiv = document.createElement('div');
    nextDiv.id = 'flujo-q-'+(qIdx+1);
    nextDiv.innerHTML = renderPregunta(qIdx+1, null);
    event.target.closest('div[style*="grid"]').parentNode.appendChild(nextDiv);
  }

  // Scroll to response
  setTimeout(function(){ div.scrollIntoView({behavior:'smooth',block:'start'}); }, 100);
}

function copiarTexto(id){
  const el = document.getElementById(id);
  if(!el) return;
  navigator.clipboard.writeText(el.textContent).then(function(){ toast('Mensaje copiado'); });
}

</script>
</body>
</html>
