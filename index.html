<style>
:root{--blue:#009ee3;--blue-dark:#0077b6;--blue-light:#e6f6fd;--green:#00a650;--green-light:#e6f9f0;--amber:#f5a623;--amber-light:#fff8e6;--red:#e53935;--red-light:#ffeaea;--gray:#f7f7f5;--gray-2:#efefed;--gray-3:#ddd;--text:#1a1a18;--text-2:#666;--text-3:#999;--white:#fff;--radius:12px;--radius-sm:8px;--shadow:0 1px 3px rgba(0,0,0,.08)}

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0ee;color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}

</style>
<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, setDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB9eAaDYBARj4z-1cpZv0CWXstDvS_7P-s",
    authDomain: "crm-mercadopago.firebaseapp.com",
    projectId: "crm-mercadopago",
    storageBucket: "crm-mercadopago.firebasestorage.app",
    messagingSenderId: "860949367928",
    appId: "1:860949367928:web:a2b0948b1809263d57318d"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const COL = 'prospectos';

  // Expose Firebase functions to global scope
  window.fbSave = async function(p){
    try{
      await setDoc(doc(db, COL, String(p.id)), p);
    }catch(e){ console.warn('Firebase save error:', e); }
  };

  window.fbDelete = async function(id){
    try{
      await deleteDoc(doc(db, COL, String(id)));
    }catch(e){ console.warn('Firebase delete error:', e); }
  };

  window.fbLoad = async function(){
    try{
      const snap = await getDocs(collection(db, COL));
      const data = [];
      snap.forEach(d => data.push(d.data()));
      return data;
    }catch(e){ console.warn('Firebase load error:', e); return null; }
  };

  // Real-time listener — syncs across devices automatically
  window.fbListen = function(callback){
    return onSnapshot(collection(db, COL), snap => {
      const data = [];
      snap.forEach(d => data.push(d.data()));
      callback(data);
    }, err => console.warn('Firebase listener error:', err));
  };

  // Signal that Firebase is ready
  window._firebaseReady = true;
  document.dispatchEvent(new Event('firebase-ready'));
  console.log('Firebase connected ✓');
  const st = document.getElementById('firebase-status');
  if(st) st.textContent = '● Conectado';
</script>

<script>
// ═══════════════════════════════════════════════════
// CRM Smart Point 2 — Janet Mendez — Mercado Pago
// All field IDs: f-nombre, f-giro, f-tel, f-emailneg,
//   f-dir, f-igneg, f-fbneg, f-resena,
//   f-dueno, f-cargo, f-wa, f-email, f-igdue, f-li, f-perfil,
//   f-fac, f-canal, f-contexto
// ═══════════════════════════════════════════════════

const DB = 'mp_crm_v6';
let prospectos = [];
let filtroActivo = 'todos';
let activoId = null;
let ultimoMsg = '';

const COLORS = ['#009ee3','#00a650','#f5a623','#e53935','#8e44ad','#16a085','#d35400','#2980b9'];
const ESTADOS = ['Primer contacto','Seguimiento','Sin respuesta','Caliente','Cerrado'];
const PCT = {'Primer contacto':15,'Seguimiento':40,'Sin respuesta':20,'Caliente':75,'Cerrado':100};
const COL = {'Primer contacto':'#009ee3','Seguimiento':'#f5a623','Sin respuesta':'#bbb','Caliente':'#f5501e','Cerrado':'#00a650'};
const BCLS = {'Primer contacto':'badge-new','Seguimiento':'badge-follow','Sin respuesta':'badge-cold','Caliente':'badge-hot','Cerrado':'badge-done'};

function aColor(s){let h=0;for(let c of s)h=(h*31+c.charCodeAt(0))%COLORS.length;return COLORS[h];}
function initials(s){if(!s)return'?';const p=s.trim().split(/\s+/);return(p[0][0]+(p[1]?p[1][0]:'')).toUpperCase();}
function hoy(n=0){const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().split('T')[0];}
function ahora(){return new Date().toISOString().substring(0,16);}
function badge(e){return `<span class="badge ${BCLS[e]||'badge-cold'}">${e}</span>`;}
function fval(id){const el=document.getElementById(id);return el?el.value.trim():'';}


// ── Auto-migrator: converts old format data to new format ──────────────────
function migrarDatosAntiguos(){
  const claves=['mp_crm_v5','mp_crm_v4','mp_crm_v3','mp_crm_v2','mp_crm_v1'];
  for(const clave of claves){
    try{
      const raw=localStorage.getItem(clave);
      if(!raw) continue;
      const datos=JSON.parse(raw);
      if(!datos||!datos.length) continue;
      // Check if already migrated
      const v6=localStorage.getItem(DB);
      const v6data=v6?JSON.parse(v6):[];
      const existingIds=v6data.map(function(p){return p.id;});
      const nuevos=datos.filter(function(p){return !existingIds.includes(p.id);}).map(function(p){
        return {
          id:p.id||Date.now(),
          nombre:p.nombre||'',
          giro:p.giro||'',
          tel:p.tel||p.telNeg||'',
          emailneg:p.emailneg||p.emailNeg||'',
          dir:p.dir||'',
          igneg:p.igneg||p.igNeg||'',
          fbneg:p.fbneg||p.fbNeg||'',
          resena:p.resena||'',
          dueno:p.dueno||'',
          cargo:p.cargo||'',
          wa:p.wa||'',
          email:p.email||'',
          igdue:p.igdue||p.igDue||'',
          li:p.li||'',
          perfil:p.perfil||p.perfilDue||'',
          fac:p.fac||p.facturacion||'',
          canal:p.canal||'WhatsApp',
          contexto:p.contexto||'',
          estado:p.estado||'Primer contacto',
          historial:p.historial||[],
          creado:p.creado||hoy()
        };
      });
      if(nuevos.length>0){
        const merged=[...nuevos,...v6data];
        localStorage.setItem(DB,JSON.stringify(merged));
        console.log('Migrados '+nuevos.length+' prospectos de '+clave);
        // Upload to Firebase
        if(window.fbSave) nuevos.forEach(function(p){window.fbSave(p);});
        return merged;
      }
    }catch(err){console.warn('Error migrando '+clave,err);}
  }
  return null;
}

function cargar(){
  // Run migrator first — converts old format data
  migrarDatosAntiguos();
  // Load from localStorage immediately (fast)
  try{prospectos=JSON.parse(localStorage.getItem(DB)||'[]');}catch(e){prospectos=[];}
  // Only use demo if truly no data anywhere
  const anyOldData=['mp_crm_v5','mp_crm_v4','mp_crm_v3'].some(function(k){
    try{const d=JSON.parse(localStorage.getItem(k)||'[]');return d.length>0;}catch(e){return false;}
  });
  if(!prospectos.length&&!anyOldData) prospectos = demo();

  // Then load from Firebase and merge (handles multi-device sync)
  function loadFromFirebase(){
    if(window.fbLoad){
      window.fbLoad().then(data => {
        if(data && data.length > 0){
          // Merge: Firebase is the source of truth
          const localIds = prospectos.map(p=>p.id);
          // Add any from Firebase not in local
          data.forEach(fp => {
            const idx = prospectos.findIndex(p=>p.id===fp.id);
            if(idx > -1) prospectos[idx] = fp; // update existing
            else prospectos.push(fp); // add new from Firebase
          });
          // Sort by creation date desc
          prospectos.sort((a,b)=>new Date(b.creado)-new Date(a.creado));
          localStorage.setItem(DB, JSON.stringify(prospectos));
          renderLista();
          renderStats();
          showSyncBadge('Sincronizado con Firebase ✓');
        }
        // Start real-time listener
        window.fbListen(data => {
          if(!data.length) return;
          prospectos = data.sort((a,b)=>new Date(b.creado)-new Date(a.creado));
          localStorage.setItem(DB, JSON.stringify(prospectos));
          renderLista();
          renderStats();
        });
      });
    }
  }

  if(window._firebaseReady){
    loadFromFirebase();
  } else {
    document.addEventListener('firebase-ready', loadFromFirebase, {once:true});
  }
}

  const icons={primer_contacto:'ti-hand-click',seguimiento:'ti-refresh-alert',reenganche:'ti-alarm',cierre:'ti-trophy'};
  const labels={primer_contacto:'Primer contacto',seguimiento:'Seguimiento',reenganche:'Sin respuesta',cierre:'Cierre'};
  const col=colors[tipo]||'#009ee3';
  const out=document.getElementById('msg-output');
  out.style.cssText='padding:0;background:transparent;border:none;min-height:0';
  out.innerHTML='';
  const wrap=document.createElement('div');
  wrap.style.cssText=`border-radius:14px;overflow:hidden;border:2px solid ${col}44`;
  // Header
  const hdr=document.createElement('div');
  hdr.style.cssText=`background:linear-gradient(135deg,${col}dd,${col}88);padding:14px 16px;display:flex;align-items:center;gap:10px`;
  hdr.innerHTML=`<div style="width:36px;height:36px;background:rgba(255,255,255,.25);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px"><i class="ti ${icons[tipo]||'ti-message'}" style="color:#fff"></i></div><div><div style="font-size:14px;font-weight:700;color:#fff">${labels[tipo]||tipo}</div><div style="font-size:11px;color:rgba(255,255,255,.85)">para ${p.nombre}</div></div>`;
  wrap.appendChild(hdr);
  // Step 1
  const s1=document.createElement('div');
  s1.style.cssText='padding:16px;background:#fff;border-bottom:1px solid #f0f0ee';
  s1.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><div style="width:24px;height:24px;background:${col};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0">1</div><span style="font-size:13px;font-weight:600;color:#1a1a18">Copia el prompt y pegalo en el chat de Claude</span></div>`;
  const prev=document.createElement('div');
  prev.style.cssText='background:#f4f4f2;border-radius:10px;padding:10px 12px;font-size:11px;font-family:monospace;color:#555;line-height:1.5;max-height:72px;overflow:hidden;position:relative;margin-bottom:12px;white-space:pre-wrap';
  prev.textContent=prompt.substring(0,180)+'...';
  const fade=document.createElement('div');
  fade.style.cssText='position:absolute;bottom:0;left:0;right:0;height:28px;background:linear-gradient(transparent,#f4f4f2)';
  prev.appendChild(fade);
  s1.appendChild(prev);
  const copyBtn=document.createElement('button');
  copyBtn.style.cssText=`width:100%;padding:12px;background:${col};color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px`;
  copyBtn.innerHTML='<i class="ti ti-copy" style="font-size:18px"></i> Copiar prompt completo';
  copyBtn.onclick=function(){
    navigator.clipboard.writeText(window._currentPrompt||'').then(()=>{
      copyBtn.innerHTML='<i class="ti ti-circle-check" style="font-size:18px"></i> Copiado — pegalolo en Claude';
      copyBtn.style.background='#00a650';
      setTimeout(()=>{copyBtn.innerHTML='<i class="ti ti-copy" style="font-size:18px"></i> Copiar prompt completo';copyBtn.style.background=col;},3000);
      toast('Prompt copiado');
    });
  };
  s1.appendChild(copyBtn);
  wrap.appendChild(s1);
  // Step 2
  const s2=document.createElement('div');
  s2.style.cssText='padding:16px;background:#fafaf8';
  s2.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><div style="width:24px;height:24px;background:${col};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0">2</div><span style="font-size:13px;font-weight:600;color:#1a1a18">Pega aqui el mensaje que genero Claude</span></div>`;
  const ta=document.createElement('textarea');
  ta.id='msg-paste-input';
  ta.placeholder='Pega aqui el mensaje generado por Claude...';
  ta.style.cssText='width:100%;min-height:120px;font-size:13px;padding:12px;border:1.5px solid #e0e0db;border-radius:10px;font-family:inherit;resize:vertical;background:#fff;outline:none;line-height:1.6;display:block;box-sizing:border-box';
  ta.addEventListener('focus',()=>ta.style.borderColor=col);
  ta.addEventListener('blur',()=>ta.style.borderColor='#e0e0db');
  s2.appendChild(ta);
  const applyBtn=document.createElement('button');
  applyBtn.style.cssText='width:100%;margin-top:10px;padding:12px;background:#00a650;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px';
  applyBtn.innerHTML='<i class="ti ti-check" style="font-size:18px"></i> Aplicar mensaje';
  applyBtn.onclick=aplicarMsgPegado;
  s2.appendChild(applyBtn);
  wrap.appendChild(s2);
  out.appendChild(wrap);

  // If sendPrompt available, auto-send
  if(typeof sendPrompt==='function') sendPrompt(prompt);
}

function aplicarMsgPegado(){
  const ta=document.getElementById('msg-paste-input');
  if(!ta||!ta.value.trim()){toast('Pega el mensaje primero');return;}
  ultimoMsg=ta.value.trim();
  toast('Mensaje listo — presiona "Guardar en historial"');
}

function copiarMsg(){
  if(!ultimoMsg){toast('Aplica un mensaje primero');return;}
  navigator.clipboard.writeText(ultimoMsg).then(()=>toast('Mensaje copiado'));
}

function copiarMsgIr(red){
  const p=prospectos.find(x=>x.id===activoId);
  if(!ultimoMsg){toast('Aplica un mensaje primero');return;}
  navigator.clipboard.writeText(ultimoMsg).then(()=>{
    toast('Copiado');
    setTimeout(()=>{
      let url='';
      if(red==='wa'&&p.wa) url='https://wa.me/'+p.wa.replace(/[^0-9]/g,'');
      else if(red==='ig'){const ig=(p.igneg||p.igdue||'').replace('@','');url=ig?'https://instagram.com/'+ig:'https://instagram.com';}
      else if(red==='email'){const em=p.email||p.emailneg||'';if(!em){toast('Sin email registrado');return;}url='mailto:'+em+'?subject=Point%20Smart%202%20%E2%80%94%20Mercado%20Pago&body='+encodeURIComponent(ultimoMsg);}
      if(url) window.open(url,'_blank');
    },600);
  });
}

function marcarEnviado(){
  if(!ultimoMsg){toast('Aplica un mensaje primero');return;}
  const p=prospectos.find(x=>x.id===activoId);if(!p)return;
  p.historial.push({tipo:'enviado',fecha:ahora(),texto:ultimoMsg});
  if(p.estado==='Primer contacto'||p.estado==='Sin respuesta') p.estado='Seguimiento';
  guardar();
  document.getElementById('msgs-list').innerHTML=renderMsgs(p);
  const cnt=document.querySelector('#sec-mensajes .sec-title span:last-child');
  const n=p.historial.filter(h=>h.tipo==='enviado'||h.tipo==='reply'||h.tipo==='nota').length;
  if(cnt) cnt.textContent=n;
  toast('Guardado en historial ✓');
  setTimeout(()=>document.getElementById('sec-mensajes')?.scrollIntoView({behavior:'smooth'}),200);
}

function agregarEvento(tipo){
  const p=prospectos.find(x=>x.id===activoId);if(!p)return;
  const txt=document.getElementById('nota-inp')?.value.trim();
  if(!txt){toast('Escribe algo primero');return;}
  p.historial.push({tipo:tipo==='reply'?'reply':'nota',fecha:ahora(),texto:txt});
  guardar();
  document.getElementById('nota-inp').value='';
  document.getElementById('msgs-list').innerHTML=renderMsgs(p);
  toast('Guardado ✓');
}

function guardarProspecto(){
  const nombre=fval('f-nombre');
  const tel=fval('f-tel');
  if(!nombre){toast('El nombre del negocio es obligatorio');return;}
  if(!tel){toast('El telefono es obligatorio');return;}
  const p={
    id:Date.now(),
    nombre, giro:fval('f-giro'), tel, emailneg:fval('f-emailneg'),
    dir:fval('f-dir'), igneg:fval('f-igneg'), fbneg:fval('f-fbneg'), resena:fval('f-resena'),
    dueno:fval('f-dueno'), cargo:fval('f-cargo'), wa:fval('f-wa'), email:fval('f-email'),
    igdue:fval('f-igdue'), li:fval('f-li'), perfil:fval('f-perfil'),
    fac:fval('f-fac'), canal:fval('f-canal')||'WhatsApp', contexto:fval('f-contexto'),
    estado:'Primer contacto', historial:[], creado:hoy()
  };
  prospectos.unshift(p);
  guardarUno(p);
  limpiarForm();
  toast('Prospecto guardado ✓');
  showScreen('lista');
}

function limpiarForm(){
  ['f-nombre','f-giro','f-tel','f-emailneg','f-dir','f-igneg','f-fbneg','f-resena',
   'f-dueno','f-cargo','f-wa','f-email','f-igdue','f-li','f-perfil','f-contexto'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.value='';
  });
  const fac=document.getElementById('f-fac');if(fac)fac.value='';
  const canal=document.getElementById('f-canal');if(canal)canal.value='WhatsApp';
  const btn=document.getElementById('btn-guardar');
  if(btn){btn.textContent='';btn.innerHTML='<i class="ti ti-device-floppy"></i> Guardar prospecto';btn.onclick=guardarProspecto;}
}

function editarProspecto(id){
  const p=prospectos.find(x=>x.id===id);if(!p)return;
  const ex=document.getElementById('edit-modal');if(ex)ex.remove();
  const modal=document.createElement('div');
  modal.id='edit-modal';
  modal.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);z-index:500;overflow-y:auto;padding:16px;box-sizing:border-box';
  const box=document.createElement('div');
  box.style.cssText='background:#fff;border-radius:16px;max-width:640px;margin:0 auto;padding:20px;margin-bottom:20px';
  function inp(fid,lbl,val,full){
    return `<div style="${full?'grid-column:span 2;':''}margin-bottom:2px">
      <label style="font-size:12px;font-weight:500;color:#666;display:block;margin-bottom:4px">${lbl}</label>
      <input id="${fid}" value="${(val||'').replace(/"/g,'&quot;')}" style="width:100%;padding:9px 12px;font-size:13px;border:1px solid #ddd;border-radius:8px;font-family:inherit;outline:none;box-sizing:border-box">
    </div>`;
  }
  function ta(fid,lbl,val){
    return `<div style="grid-column:span 2;margin-bottom:2px">
      <label style="font-size:12px;font-weight:500;color:#666;display:block;margin-bottom:4px">${lbl}</label>
      <textarea id="${fid}" style="width:100%;padding:9px 12px;font-size:13px;border:1px solid #ddd;border-radius:8px;font-family:inherit;min-height:64px;resize:vertical;outline:none;box-sizing:border-box">${val||''}</textarea>
    </div>`;
  }
  const facOpts={'':'Seleccionar...','5k-15k':'$5k-$15k','15k-60k':'$15k-$60k','60k+':'+$60k'};
  const canalOpts=['WhatsApp','Visita presencial','Llamada','Instagram','Email'];
  box.innerHTML=
    `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-size:16px;font-weight:700">Editar expediente</div>
      <button onclick="document.getElementById('edit-modal').remove()" style="background:none;border:none;font-size:26px;cursor:pointer;color:#999;padding:0;line-height:1">×</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      ${inp('ef-nombre','Nombre del negocio *',p.nombre)}
      ${inp('ef-giro','Giro / Tipo',p.giro)}
      ${inp('ef-tel','Telefono *',p.tel)}
      ${inp('ef-emailneg','Email negocio',p.emailneg)}
      ${inp('ef-dir','Direccion',p.dir,true)}
      ${inp('ef-dueno','Dueno / Contacto',p.dueno)}
      ${inp('ef-cargo','Cargo',p.cargo)}
      ${inp('ef-wa','WhatsApp',p.wa)}
      ${inp('ef-email','Email personal',p.email)}
      ${inp('ef-igneg','Instagram negocio',p.igneg)}
      ${inp('ef-igdue','Instagram dueno',p.igdue)}
      <div><label style="font-size:12px;font-weight:500;color:#666;display:block;margin-bottom:4px">Facturacion</label>
        <select id="ef-fac" style="width:100%;padding:9px 12px;font-size:13px;border:1px solid #ddd;border-radius:8px;font-family:inherit">
          ${Object.keys(facOpts).map(o=>`<option value="${o}"${p.fac===o?' selected':''}>${facOpts[o]}</option>`).join('')}
        </select></div>
      <div><label style="font-size:12px;font-weight:500;color:#666;display:block;margin-bottom:4px">Canal</label>
        <select id="ef-canal" style="width:100%;padding:9px 12px;font-size:13px;border:1px solid #ddd;border-radius:8px;font-family:inherit">
          ${canalOpts.map(o=>`<option value="${o}"${p.canal===o?' selected':''}>${o}</option>`).join('')}
        </select></div>
      ${ta('ef-contexto','Contexto de venta',p.contexto)}
      ${ta('ef-resena','Resena del negocio',p.resena)}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px">
      <button onclick="document.getElementById('edit-modal').remove()" style="padding:12px;background:#f7f7f5;color:#1a1a18;border:1px solid #ddd;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">Cancelar</button>
      <button onclick="guardarEdicion(${id})" style="padding:12px;background:#009ee3;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">Guardar cambios</button>
    </div>`;
  modal.appendChild(box);
  document.body.appendChild(modal);
  modal.addEventListener('click',ev=>{if(ev.target===modal)modal.remove();});
}

function guardarEdicion(id){
  const p=prospectos.find(x=>x.id===id);if(!p)return;
  const nombre=document.getElementById('ef-nombre')?.value.trim();
  const tel=document.getElementById('ef-tel')?.value.trim();
  if(!nombre){toast('El nombre es obligatorio');return;}
  if(!tel){toast('El telefono es obligatorio');return;}
  p.nombre=nombre;p.giro=document.getElementById('ef-giro')?.value.trim()||p.giro;
  p.tel=tel;p.emailneg=document.getElementById('ef-emailneg')?.value.trim();
  p.dir=document.getElementById('ef-dir')?.value.trim();
  p.dueno=document.getElementById('ef-dueno')?.value.trim();
  p.cargo=document.getElementById('ef-cargo')?.value.trim();
  p.wa=document.getElementById('ef-wa')?.value.trim();
  p.email=document.getElementById('ef-email')?.value.trim();
  p.igneg=document.getElementById('ef-igneg')?.value.trim();
  p.igdue=document.getElementById('ef-igdue')?.value.trim();
  p.fac=document.getElementById('ef-fac')?.value;
  p.canal=document.getElementById('ef-canal')?.value;
  p.contexto=document.getElementById('ef-contexto')?.value.trim();
  p.resena=document.getElementById('ef-resena')?.value.trim();
  guardar();
  document.getElementById('edit-modal').remove();
  toast('Expediente actualizado ✓');
  verDetalle(id);
}

function eliminarProspecto(id){
  if(!confirm('¿Eliminar este prospecto?')) return;
  prospectos=prospectos.filter(x=>x.id!==id);
  localStorage.setItem(DB,JSON.stringify(prospectos));
  if(window.fbDelete) window.fbDelete(id);
  toast('Prospecto eliminado');showScreen('lista');
}

function exportarDatos(){
  const data=localStorage.getItem(DB)||'[]';
  const n=JSON.parse(data).length;
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='CRM_MercadoPago_'+hoy()+'.json';a.click();
  URL.revokeObjectURL(url);
  toast(`Respaldo descargado (${n} prospectos)`);
}

function importarDatos(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=ev=>{
    const file=ev.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev2=>{
      try{
        const data=JSON.parse(ev2.target.result);
        if(!Array.isArray(data)) throw new Error('Formato invalido');
        const existing=prospectos.map(p=>p.id);
        const nuevos=data.filter(p=>!existing.includes(p.id));
        prospectos=[...prospectos,...nuevos];
        guardar();renderLista();renderStats();showScreen('lista');
        toast(`${nuevos.length} prospectos importados`);
        const m=document.getElementById('backup-modal');if(m)m.remove();
      }catch(err){toast('Error: '+err.message);}
    };
    reader.readAsText(file);
  };
  input.click();
}

function mostrarBackup(){
  const ex=document.getElementById('backup-modal');if(ex){ex.remove();return;}
  const m=document.createElement('div');
  m.id='backup-modal';
  m.style.cssText='position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#fff;border:1px solid var(--gray-3);border-radius:16px;padding:20px;box-shadow:0 8px 32px rgba(0,0,0,.15);z-index:200;width:300px;max-width:calc(100vw - 32px)';
  m.innerHTML=`<div style="font-size:15px;font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">Respaldo de datos<button onclick="document.getElementById('backup-modal').remove()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#999;padding:0;line-height:1">×</button></div>
  <button onclick="exportarDatos()" style="width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit"><i class="ti ti-download" style="font-size:16px"></i> Exportar prospectos (.json)</button>
  <button onclick="importarDatos()" style="width:100%;padding:12px;background:var(--gray);color:var(--text);border:1px solid var(--gray-3);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit"><i class="ti ti-upload" style="font-size:16px"></i> Importar prospectos (.json)</button>`;
  document.body.appendChild(m);
  setTimeout(()=>document.addEventListener('click',function h(ev){if(!m.contains(ev.target)&&ev.target.title!=='Respaldo'){m.remove();document.removeEventListener('click',h);}},300));
}

function renderResumen(){
  const total=prospectos.length;
  const tpv=prospectos.filter(p=>p.fac==='60k+').length;
  const done=prospectos.filter(p=>p.estado==='Cerrado').length;
  const por={};prospectos.forEach(p=>{por[p.estado]=(por[p.estado]||0)+1;});
  let html=`<div class="card"><div class="sec-title"><i class="ti ti-chart-bar"></i> Pipeline</div>
  <div class="stats-row" style="margin-bottom:0">
    <div class="stat-pill"><div class="stat-n">${total}</div><div class="stat-l">Total</div></div>
    <div class="stat-pill"><div class="stat-n">${tpv}</div><div class="stat-l">TPV +$60k</div></div>
    <div class="stat-pill"><div class="stat-n">${por['Caliente']||0}</div><div class="stat-l">Calientes</div></div>
    <div class="stat-pill"><div class="stat-n">${done}</div><div class="stat-l">Cerrados</div></div>
  </div></div>
  <div class="card"><div class="sec-title"><i class="ti ti-progress"></i> Por estado</div>`;
  ESTADOS.forEach(e=>{const n=por[e]||0;html+=`<div class="ps">${badge(e)}<span style="font-weight:600">${n}</span></div>`;});
  html+=`</div><div class="card"><div class="sec-title"><i class="ti ti-database"></i> Respaldo de datos</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <button onclick="exportarDatos()" style="padding:12px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px"><i class="ti ti-download"></i> Exportar</button>
    <button onclick="importarDatos()" style="padding:12px;background:var(--gray);color:var(--text);border:1px solid var(--gray-3);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px"><i class="ti ti-upload"></i> Importar</button>
  </div>
  <p style="font-size:11px;color:#999;text-align:center;margin-top:10px">Exporta para respaldar o transferir entre dispositivos</p>
  </div>`;
  document.getElementById('resumen-container').innerHTML=html;
}

// Also render flujo de conversacion
function renderFlujo(p){return '';}  // placeholder — can be added back later

cargar();renderStats();renderLista();

</script>
